name: Bug report
description: Report a reproducible Cosmos Term problem
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Cosmos Term. Please remove private paths,
        terminal output, credentials, and tokens before attaching logs.
  - type: input
    id: version
    attributes:
      label: Cosmos Term version
      description: Run `cosmos-term -V` or copy the version from the app bundle.
      placeholder: 20260718-120000-abcdef12
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS and Mac model
      placeholder: macOS 26.0, Apple M4 Pro
    validations:
      required: true
  - type: dropdown
    id: pane
    attributes:
      label: Pane type
      options:
        - Native shell pane
        - tmux pane
        - Both
        - Not pane-related
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Include what you expected and what happened instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Open Cosmos Term...
        2. Run...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Relevant configuration
      description: Paste only the relevant, redacted Cosmos configuration.
      render: lua
  - type: textarea
    id: logs
    attributes:
      label: Redacted logs or screenshots
      description: Drag screenshots here or paste the smallest relevant log excerpt.
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed credentials, tokens, financial data, and private terminal output.
          required: true
