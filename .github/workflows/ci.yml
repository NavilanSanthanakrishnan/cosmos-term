name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: macOS
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Test workspace integration
        run: cargo test -p cosmos-workspace

      - name: Check application packages
        run: cargo check -p wezterm-gui -p wezterm -p wezterm-mux-server

      - name: Check patch whitespace
        run: git diff --check
